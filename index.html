<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>2026世界杯预测追踪</title>
<style>
  :root {
    --green: #1f9d55; --green-bg: #eafaf0;
    --red: #d64545; --red-bg: #fdecec;
    --blue: #1d6fd6; --blue-bg: #eaf2fd;
    --gray-bg: #f6f7f9; --border: #e2e5ea; --text: #1f2430; --muted: #7a8195;
  }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background: #fff; color: var(--text); margin: 0; padding: 24px;
  }
  h1 { font-size: 22px; margin: 0 0 4px; }
  .subtitle { color: var(--muted); font-size: 13px; margin-bottom: 20px; }
  .stats { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
  .stat-card {
    background: var(--gray-bg); border: 1px solid var(--border); border-radius: 10px;
    padding: 10px 16px; min-width: 130px;
  }
  .stat-card .num { font-size: 20px; font-weight: 700; }
  .stat-card .label { font-size: 12px; color: var(--muted); }
  .controls { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
  .controls button {
    border: 1px solid var(--border); background: #fff; border-radius: 8px;
    padding: 6px 14px; font-size: 13px; cursor: pointer; color: var(--text);
  }
  .controls button.active { background: var(--text); color: #fff; border-color: var(--text); }
  .round-group { margin-bottom: 22px; }
  .round-title {
    font-size: 14px; font-weight: 700; margin: 18px 0 8px; padding-bottom: 4px;
    border-bottom: 2px solid var(--text);
  }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th {
    text-align: left; padding: 6px 8px; color: var(--muted); font-weight: 600;
    font-size: 11px; text-transform: uppercase; letter-spacing: .03em;
    border-bottom: 1px solid var(--border);
  }
  td { padding: 8px; vertical-align: middle; }
  tr.match-row { border-bottom: 1px solid var(--border); }
  tr.match-row:hover { background: #fafbfc; }
  .teams { font-weight: 600; white-space: nowrap; }
  .box {
    display: inline-block; padding: 3px 10px; border-radius: 6px; font-weight: 700;
    border: 1.5px solid transparent;
  }
  .box.correct { background: var(--green-bg); color: var(--green); border-color: var(--green); }
  .box.wrong { background: var(--red-bg); color: var(--red); border-color: var(--red); }
  .box.pending { background: var(--gray-bg); color: var(--muted); border-color: var(--border); }
  .box.actual { background: var(--blue-bg); color: var(--blue); border-color: var(--blue); }
  .pct { color: var(--muted); font-size: 11px; margin-left: 3px; }
  .probs { font-size: 11px; color: var(--muted); white-space: nowrap; }
  .score-chips { display: flex; gap: 4px; flex-wrap: wrap; }
  .chip {
    display: inline-flex; align-items: baseline; gap: 3px; padding: 2px 7px; border-radius: 6px;
    font-weight: 700; font-size: 12px; border: 1.5px solid var(--border); background: var(--gray-bg); color: var(--text);
  }
  .chip.hit { background: var(--green-bg); color: var(--green); border-color: var(--green); }
  .pending-badge {
    display: inline-block; background: #fff4e0; color: #a56a00; border: 1px solid #f0cf8f;
    border-radius: 6px; padding: 1px 8px; font-size: 11px; font-weight: 600;
  }
  .market-row { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .market-row .edge-pos { color: var(--green); font-weight: 700; }
  .market-row .edge-neg { color: var(--red); font-weight: 700; }
  .champion-panel {
    background: var(--gray-bg); border: 1px solid var(--border); border-radius: 10px;
    padding: 14px 18px; margin-bottom: 20px;
  }
  .champion-panel h2 { font-size: 15px; margin: 0 0 10px; }
  .champion-cols { display: flex; gap: 28px; flex-wrap: wrap; }
  .champion-col { min-width: 220px; }
  .champion-col .col-label { font-size: 12px; color: var(--muted); margin-bottom: 6px; font-weight: 600; }
  .champion-list { list-style: none; margin: 0; padding: 0; }
  .champion-list li {
    display: flex; justify-content: space-between; padding: 4px 0; font-size: 13px;
    border-bottom: 1px solid var(--border);
  }
  .champion-list li:last-child { border-bottom: none; }
  .champion-list .team-name { font-weight: 600; }
  .champion-list .team-val { color: var(--blue); font-weight: 700; }
</style>
</head>

const RESULT_LABEL = {"home_win": "主胜", "draw": "平局", "away_win": "客胜"};

function renderChampion() {
  const top5 = Object.entries(CHAMPION.champion_probs).slice(0, 5);
  document.getElementById("championTop5").innerHTML = top5.map(([team, p]) => `
    <li><span class="team-name">${team}</span><span class="team-val">${(p*100).toFixed(1)}%</span></li>
  `).join("");
  document.getElementById("eloTop5").innerHTML = CHAMPION.elo_top5.map(e => `
    <li><span class="team-name">${e.team}</span><span class="team-val">${e.elo.toFixed(0)}</span></li>
  `).join("");
}

const ROUND_GROUPS = [
  {key: "group", label: "小组赛", rounds: ["Group A","Group B","Group C","Group D","Group E","Group F","Group G","Group H","Group I","Group J","Group K","Group L"]},
  {key: "r32", label: "32强", rounds: ["Round of 32"]},
  {key: "r16", label: "16强", rounds: ["Round of 16"]},
  {key: "qf", label: "8强", rounds: ["Quarter-final"]},
  {key: "sf", label: "4强", rounds: ["Semi-final"]},
  {key: "final", label: "决赛", rounds: ["Third-place play-off","Final"]},
];

let currentFilter = "all";

function computeStats(rows) {
  const played = rows.filter(r => !r.pending);
  const resultHits = played.filter(r => r.result_correct).length;
  const top1Hits = played.filter(r => r.score_correct_top1).length;
  const top3Hits = played.filter(r => r.score_correct_top3).length;
  const pendingCount = rows.filter(r => r.pending).length;
  return { total: rows.length, played: played.length, resultHits, top1Hits, top3Hits, pendingCount };
}

function renderStats() {
  const s = computeStats(DATA);
  const box = document.getElementById("stats");
  const items = [
    ["总场次", s.total],
    ["已完赛", s.played],
    ["胜平负命中", s.played ? `${s.resultHits}/${s.played} (${(100*s.resultHits/s.played).toFixed(1)}%)` : "-"],
    ["比分Top1命中", s.played ? `${s.top1Hits}/${s.played} (${(100*s.top1Hits/s.played).toFixed(1)}%)` : "-"],
    ["比分Top3命中", s.played ? `${s.top3Hits}/${s.played} (${(100*s.top3Hits/s.played).toFixed(1)}%)` : "-"],
    ["待预测", s.pendingCount],
  ];
  box.innerHTML = items.map(([label, num]) => `
    <div class="stat-card"><div class="num">${num}</div><div class="label">${label}</div></div>
  `).join("");
}

function renderControls() {
  const box = document.getElementById("controls");
  const all = [{key:"all", label:"全部"}, ...ROUND_GROUPS.map(g => ({key:g.key, label:g.label}))];
  box.innerHTML = all.map(g => `<button data-key="${g.key}" class="${g.key===currentFilter?'active':''}">${g.label}</button>`).join("");
  box.querySelectorAll("button").forEach(btn => {
    btn.addEventListener("click", () => {
      currentFilter = btn.dataset.key;
      renderControls();
      renderContent();
    });
  });
}

function matchRowHTML(r) {
  const resultBoxClass = r.pending ? "pending" : (r.result_correct ? "correct" : "wrong");
  const actualBoxClass = r.pending ? "pending" : "actual";
  const actualScore = r.pending ? "—" : r.actual_score;
  const actualResultLabel = r.pending ? '<span class="pending-badge">待开赛</span>' : RESULT_LABEL[r.actual_result];
  const scoreChips = r.top_scores.map(t => {
    const hit = !r.pending && t.score === r.actual_score;
    return `<span class="chip ${hit ? 'hit' : ''}">${t.score}<span class="pct">${t.pct}%</span></span>`;
  }).join("");
  let marketHTML = "";
  if (r.pending && r.market_odds) {
    const m = r.market_odds;
    const edge = (parseFloat(r.pred_home_pct) - m.home_pct).toFixed(1);
    const edgeClass = edge > 3 ? "edge-pos" : (edge < -3 ? "edge-neg" : "");
    marketHTML = `<div class="market-row">市场(${m.n_books}家欧洲博彩公司去水共识): 主${m.home_pct}% / 平${m.draw_pct}% / 客${m.away_pct}%
      &nbsp;|&nbsp; 主胜分歧 <span class="${edgeClass}">${edge > 0 ? "+" : ""}${edge}pt</span></div>`;
  }
  return `
    <tr class="match-row">
      <td class="teams">${r.home} <span style="color:#aab;">vs</span> ${r.away}</td>
      <td><span class="box ${actualBoxClass}">${actualScore}</span></td>
      <td><span class="box ${actualBoxClass}">${actualResultLabel}</span></td>
      <td><div class="score-chips">${scoreChips}</div></td>
      <td><span class="box ${resultBoxClass}">${RESULT_LABEL[r.pred_result]}</span></td>
      <td class="probs">主${r.pred_home_pct}% / 平${r.pred_draw_pct}% / 客${r.pred_away_pct}%${marketHTML}</td>
    </tr>
  `;
}

function renderContent() {
  const el = document.getElementById("content");
  const groups = currentFilter === "all" ? ROUND_GROUPS : ROUND_GROUPS.filter(g => g.key === currentFilter);
  let out = "";
  for (const g of groups) {
    const rows = DATA.filter(r => g.rounds.includes(r.round));
    if (rows.length === 0) continue;
    out += `<div class="round-group">
      <div class="round-title">${g.label} (${rows.length}场)</div>
      <table>
        <thead><tr>
          <th>对阵</th><th>真实比分</th><th>真实结果</th><th>预测比分(Top3)</th><th>预测结果</th><th>预测概率</th>
        </tr></thead>
        <tbody>${rows.map(matchRowHTML).join("")}</tbody>
      </table>
    </div>`;
  }
  el.innerHTML = out;
}

renderChampion();
renderStats();
renderControls();
renderContent();
</script>

</body>
</html>
